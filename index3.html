<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI TL - 안전기준 적용 판단 프로그램 (1차 버전)</title>
<link rel="icon" href="data:,">
<style>
/* CSS 핵심 변수 및 기본 설정 */
:root{--bg:#0b1220;--bg-grad-1:#14234a;--bg-grad-2:#0b1220;--card:#111b2e;--card-soft:rgba(17,27,46,.72);--panel-top:rgba(255,255,255,.04);--panel-bottom:rgba(255,255,255,.02);--muted:#9fb0d0;--text:#e7eefc;--green:#19c37d;--red:#ff4d4f;--line:#22314f;--shadow:0 10px 30px rgba(0,0,0,.35);--input-bg:rgba(10,16,30,.55);--button-bg:rgba(22,37,69,.85);--button-hover:rgba(35,60,105,.95);--header-bg-1:rgba(11,18,32,.98);--header-bg-2:rgba(11,18,32,.92);--selected-bg:#b6ff5c;--selected-text:#000;--img-caption:#9fb0d0;--img-border:#22314f;--mark-bg:yellow;--mark-text:black;}

*{box-sizing:border-box} 
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:radial-gradient(1200px 600px at 20% 0%,var(--bg-grad-1) 0%,var(--bg-grad-2) 60%);color:var(--text);font-size:14px;transition:background .25s,color .25s;}
.wrap{max-width:1200px;margin:0 auto;padding:14px 16px 140px}
header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg, var(--header-bg-1), var(--header-bg-2));border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}

/* 헤더 레이아웃 */
.header-inner{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.brand h1{margin:0;font-size:20px;font-weight:900;letter-spacing:-0.5px;} 
.brand .sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* 글씨체 조절 버튼 영역 */
.font-controls{display:flex;gap:6px;align-items:center;}
.font-controls button{width: 36px; height: 36px; border-radius:8px; border:1px solid var(--line); background:var(--button-bg); color:var(--text); font-weight:900; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; justify-content:center; transition: background 0.2s;}
.font-controls button:hover{background:var(--button-hover);}

/* 메인 패널 및 입력창 */
.panel{background:linear-gradient(180deg, var(--panel-top), var(--panel-bottom));border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-top:8px;}
.controls{display:grid;grid-template-columns:2fr 1fr;gap:12px;} 
@media(max-width:900px){.controls{display:flex;flex-direction:column} .controls>div:last-child{order:-1}}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;}
input,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--input-bg);color:var(--text);font-size:14px;}
button{cursor:pointer;font-weight:700;background:var(--button-bg)}

.topics{border:1px solid var(--line);border-radius:10px;padding:8px;max-height:180px;overflow-y:auto;background:var(--card);}
.topic{display:flex;gap:8px;align-items:flex-start;padding:6px 4px;border-bottom:1px dashed rgba(255,255,255,0.08)} .topic:last-child{border-bottom:none} .topic input{width:auto;margin-top:2px} .topic span{font-size:13px}

/* 결과 카드 */
.grid{display:grid;gap:12px;margin-top:16px}
.card{background:var(--card-soft);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.title{font-weight:900; font-size:15px; margin:0;} 
.badge{font-size:12px;font-weight:800;text-align:right} .ok{color:var(--green)} .no{color:var(--red)} .range{font-size:11px;color:var(--muted);margin-top:2px;}
.row{margin-top:10px} .text{white-space:pre-line;line-height:1.6;font-size:14px;margin:0;padding:0;color:rgba(255,255,255,0.95);} 
mark{background:var(--mark-bg);color:var(--mark-text)}
.help-text{margin-top:6px;font-size:11.5px;color:var(--muted)}
.selected-title{display:inline-block;background:var(--selected-bg);color:var(--selected-text);padding:2px 6px;border-radius:6px;}

/* 기타 */
.image-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;} .image-modal img{max-width:95%;max-height:95%;border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,0.6);}
#backToTopBtn{position:fixed;right:18px;bottom:18px;width:auto;padding:12px 16px;border-radius:12px;border:1px solid var(--line);background:var(--button-bg);color:var(--text);font-weight:800;cursor:pointer;box-shadow:var(--shadow);display:none;z-index:999;font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <h1>AI TL</h1>
      <div class="sub">안전기준 적용 판단 프로그램</div>
    </div>
    <div class="font-controls">
      <button id="increase-font" type="button" title="글자 크게">A+</button>
      <button id="decrease-font" type="button" title="글자 작게">A−</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="controls">
      <div>
        <div style="display:flex; gap:6px; align-items:center;">
          <input id="search" placeholder="검사항목 or 기준내용 검색">
          <button id="reset" type="button" title="검색어 지우기" style="width:auto; padding:0 14px; font-size:16px;">✕</button>
          <button id="voiceBtn" type="button" title="음성으로 검색" style="width:auto; padding:0 14px; font-size:16px;">🎤</button>
        </div>
        <div id="voiceStatus" style="font-size:11px; margin-top:4px; color:var(--muted);"></div>

        <label style="margin-top: 12px;">검사항목 선택</label>
        <div class="topics" id="topics"></div>
      </div>

      <div>
        <label>건축허가일</label>
        <input type="date" id="date">
        <div class="help-text">※ 허가일 기준 적용/미적용 자동 판단</div>
      </div>
    </div>
  </div>
  <div class="grid" id="results"></div>
  <footer style="margin-top:12px;color:var(--muted);font-size:12px;text-align:right;">🟩 적용 / 🟥 미적용</footer>
</div>

<div id="imageModal" class="image-modal" onclick="closeImageModal()"><img id="modalImage" alt=""></div>
<button id="backToTopBtn" type="button">🔍 맨 위로</button>

<script>
// --- 초기화 및 상태 ---
let DATA=[], TITLE_MAP={}, currentFontSize=14;
const topicsEl=document.getElementById('topics'), resultsEl=document.getElementById('results'), dateEl=document.getElementById('date'), search=document.getElementById('search');

// --- 유틸리티 ---
function norm(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }
function passFilter(hayRaw, qRaw){
  const h=norm(hayRaw), q=norm(qRaw);
  if(!q) return true;
  if(q.length>=2){ for(let i=0;i<q.length-1;i++) if(h.includes(q.slice(i,i+2))) return true; return false; }
  return true;
}
function scoreMatch(hayRaw, qRaw){
  const h=norm(hayRaw), q=norm(qRaw);
  if(!q) return 0;
  let ch=0, bh=0;
  new Set([...q]).forEach(c=>{ if(h.includes(c)) ch++; });
  if(q.length>=2){ for(let i=0;i<q.length-1;i++) if(h.includes(q.slice(i,i+2))) bh++; }
  return ch+(bh*3);
}

// --- 글씨체 조절 ---
const applyFont=()=>document.querySelectorAll('body,input,button,.topic span,.title,.text,.badge,.range').forEach(e=>e.style.fontSize=currentFontSize+'px');
document.getElementById('increase-font').onclick=()=>{currentFontSize++; applyFont()};
document.getElementById('decrease-font').onclick=()=>{currentFontSize=Math.max(10,currentFontSize-1); applyFont()};

// --- 검색 하이라이트 및 이미지 ---
function highlight(t,k){
  if(!t||!k) return t;
  const kw=[...new Set(k.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean).sort((a,b)=>b.length-a.length))];
  if(!kw.length) return t;
  let ranges=[];
  kw.forEach(w=>{
    let tgt=w.replace(/\s+/g,''), cmp='', map=[]; if(!tgt) return;
    for(let i=0;i<t.length;i++){ if(!/\s/.test(t[i])){ cmp+=t[i]; map.push(i); } }
    let start=0; while(true){ const idx=cmp.toLowerCase().indexOf(tgt.toLowerCase(),start); if(idx===-1) break; ranges.push([map[idx],map[idx+tgt.length-1]+1]); start=idx+tgt.length; }
  });
  if(!ranges.length) return t; ranges.sort((a,b)=>a[0]-b[0]);
  let merged=[], res='', last=0;
  for(const [s,e] of ranges) (!merged.length || s>merged[merged.length-1][1]) ? merged.push([s,e]) : merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],e);
  for(const [s,e] of merged){ res+=t.slice(last,s)+'<mark>'+t.slice(s,e)+'</mark>'; last=e; }
  return res+t.slice(last);
}
function renderImage(img){ return img?`<div style="margin-top:12px"><img src="${img}" style="width:100%;max-width:400px;cursor:zoom-in;border:1px solid var(--img-border);border-radius:8px;" onclick="document.getElementById('modalImage').src='${img}';document.getElementById('imageModal').style.display='flex';" alt=""><div style="margin-top:6px;font-size:12px;color:var(--img-caption);text-align:center">※ 클릭하여 확대</div></div>`:''; }
function closeImageModal(){ document.getElementById('imageModal').style.display='none'; }

// --- 데이터 로드 ---
fetch('./data/criteria.json').then(r=>r.json()).then(j=>{
  DATA=j.criteria||[]; DATA.forEach(i=>{if(!TITLE_MAP[i.title])TITLE_MAP[i.title]=[]; TITLE_MAP[i.title].push(i);});
  renderTopics(); renderResults();
}).catch(()=>resultsEl.innerHTML='<div class="card"><div class="title">데이터 로드 실패</div></div>');

// --- 렌더링 로직 (최적화 반영) ---
function renderTopics(){
  if(!topicsEl) return; 
  const q=norm(search.value), ts=Object.keys(TITLE_MAP);
  let show = q ? ts.map(t=>({t,s:scoreMatch(t,search.value),p:passFilter(t,search.value)})).filter(x=>x.p||x.s>0).sort((a,b)=>b.s-a.s||a.t.localeCompare(b.t,'ko')).slice(0,200).map(x=>x.t) : ts;
  
  topicsEl.innerHTML = show.map(t => 
    `<label class="topic"><input type="checkbox" value="${t}" onchange="renderResults()"><span>${highlight(t,search.value)}</span></label>`
  ).join('');
}

function renderResults(){
  if(!resultsEl) return; 
  const sel=new Set([...document.querySelectorAll('#topics input:checked')].map(c=>c.value)), qRaw=search.value.trim(), q=norm(qRaw);
  let mat=[];
  if(q){
    let pool=[]; DATA.forEach((i,idx)=>{ if(passFilter(i.title+" "+i.label+" "+i.text,qRaw)) pool.push({i,idx}); });
    if(!pool.length) DATA.forEach((i,idx)=>pool.push({i,idx}));
    mat = pool.map(x=>({i:x.i, idx:x.idx, t:scoreMatch(x.i.title,qRaw)*2+scoreMatch(x.i.text,qRaw)+scoreMatch(x.i.label,qRaw)})).filter(x=>x.t>0)
          .sort((a,b)=> (sel.has(a.i.title)?0:1)-(sel.has(b.i.title)?0:1) || b.t-a.t || a.idx-b.idx).slice(0,120).map(x=>({i:x.i}));
  } else if(sel.size) sel.forEach(v=>(TITLE_MAP[v]||[]).forEach(i=>mat.push({i})));
  else DATA.slice(0, 50).forEach(i=>mat.push({i})); // 기본 로딩 시 최상단 일부만 표시
  
  if(!mat.length){ resultsEl.innerHTML=`<div class="card"><div class="title">결과 없음</div></div>`; return; }

  let htmlString = "";
  mat.forEach(({i})=>{
    const app=isApplied(dateEl.value,i.from,i.to), selTitle=sel.has(i.title);
    htmlString += `
      <div class="card">
        <div class="card-header">
          <div class="title">${selTitle?`<span class="selected-title">${highlight(i.title,qRaw)}</span>`:highlight(i.title,qRaw)}</div>
          <div class="badge ${app?'ok':'no'}">${app?'🟩 적용':'🟥 미적용'}<div class="range">${i.from||'—'} ~ ${i.to||'현재'}</div></div>
        </div>
        <div class="row"><div class="text">${highlight(i.text,qRaw)}</div></div>
        ${i.image ? `<div class="card-image-wrap">${renderImage(i.image)}</div>` : ''}
      </div>`;
  });
  resultsEl.innerHTML = htmlString;
}
const isApplied=(d,f,t)=>{ if(!d)return false; const b=new Date(d); return (!f||b>=new Date(f))&&(!t||b<=new Date(t)); };

// --- 이벤트 리스너 ---
let searchTimer;
search.oninput=()=>{ 
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { renderTopics(); renderResults(); }, 150); 
};
document.getElementById('reset').onclick=()=>{ search.value=''; dateEl.value=''; document.querySelectorAll('#topics input').forEach(c=>c.checked=false); renderTopics(); renderResults(); };
dateEl.addEventListener('input',renderResults); dateEl.addEventListener('change',renderResults);

// --- 음성 검색 ---
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rc = new SR(), vBtn = document.getElementById('voiceBtn'), vStat = document.getElementById('voiceStatus');
  rc.lang="ko-KR"; rc.interimResults=true; rc.continuous=false; let listening=false;
  vBtn.onclick=()=>{
    if(listening){ rc.stop(); return; }
    try{ listening=true; vStat.textContent="🎙️ 듣는 중..."; rc.start(); }catch(e){ listening=false; vStat.textContent="오류 발생"; }
  };
  rc.onresult=(e)=>{
    let f="", i="";
    for(let j=e.resultIndex; j<e.results.length; j++) e.results[j].isFinal ? f+=e.results[j][0].transcript : i+=e.results[j][0].transcript;
    search.value=(f||i||"").trim(); renderTopics(); renderResults();
    if(f) vStat.textContent="인식 완료!";
  };
  rc.onend=()=>{ listening=false; setTimeout(()=>vStat.textContent="", 2000); };
}

// --- 스크롤 탑 ---
const bTop=document.getElementById('backToTopBtn');
window.onscroll=()=>bTop.style.display=(window.scrollY>250)?'block':'none';
bTop.onclick=()=>{ window.scrollTo({top:0,behavior:'smooth'}); setTimeout(()=>search.focus(),300); };
</script>
</body>
</html>
